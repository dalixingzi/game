<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水课生存指南 💤</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap');

:root {
  --bg: #f5f0e8;
  --paper: #fffef7;
  --ink: #2c2c2c;
  --ink-light: #666;
  --accent: #e74c3c;
  --accent2: #3498db;
  --accent3: #27ae60;
  --accent4: #f39c12;
  --grid-line: #c8daf0;
  --danger: #e74c3c;
  --safe: #27ae60;
  --warn: #f39c12;
  --shadow: rgba(0,0,0,.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'ZCOOL XiaoWei', serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow: hidden;
}

#game-container {
  width: 100vw; height: 100vh;
  position: relative;
  background:
    repeating-linear-gradient(transparent, transparent 27px, var(--grid-line) 27px, var(--grid-line) 28px),
    linear-gradient(90deg, transparent 59px, #f0c0c0 59px, #f0c0c0 61px, transparent 61px);
  background-color: var(--paper);
  overflow: hidden;
}

.screen {
  position: absolute; inset: 0;
  display: none; flex-direction: column; align-items: center;
  padding: 20px; overflow-y: auto;
  animation: fadeIn .4s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

#title-screen { justify-content: center; gap: 30px; }

.title-logo {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: clamp(42px, 8vw, 72px);
  color: var(--accent);
  text-shadow: 3px 3px 0 rgba(0,0,0,.1);
  letter-spacing: 4px;
  animation: titleBounce 2s ease-in-out infinite;
  text-align: center;
}
@keyframes titleBounce { 0%,100%{transform:translateY(0) rotate(-1deg);} 50%{transform:translateY(-8px) rotate(1deg);} }

.title-sub { font-size: 18px; color: var(--ink-light); text-align: center; line-height: 1.8; }
.title-doodle { font-size: 40px; letter-spacing: 12px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }

.btn {
  font-family: 'ZCOOL KuaiLe', cursive; font-size: 20px;
  padding: 14px 40px; border: 3px solid var(--ink);
  background: var(--paper); color: var(--ink);
  cursor: pointer; border-radius: 8px; transition: all .15s;
  box-shadow: 4px 4px 0 var(--ink);
}
.btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink); }
.btn:active { transform:translate(4px,4px); box-shadow:none; }
.btn-primary { background:var(--accent); color:#fff; border-color:#c0392b; box-shadow:4px 4px 0 #c0392b; }
.btn-safe { background:var(--safe); color:#fff; border-color:#1e8449; box-shadow:4px 4px 0 #1e8449; }
.btn-small { font-size:15px; padding:8px 20px; }

.schedule-title { font-family:'ZCOOL KuaiLe',cursive; font-size:32px; margin:20px 0 10px; color:var(--accent2); }

.schedule-grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px; width:100%; max-width:900px; padding:10px 20px;
}

.course-card {
  background:var(--paper); border:2px solid var(--ink);
  border-radius:12px; padding:18px; cursor:pointer;
  transition:all .2s; box-shadow:3px 3px 0 var(--shadow);
  position:relative; overflow:hidden;
}
.course-card::before { content:''; position:absolute; top:0; left:0; width:6px; height:100%; }
.course-card:nth-child(1)::before { background:var(--accent); }
.course-card:nth-child(2)::before { background:var(--accent2); }
.course-card:nth-child(3)::before { background:var(--accent3); }
.course-card:nth-child(4)::before { background:var(--accent4); }
.course-card:hover { transform:translateY(-4px) rotate(-.5deg); box-shadow:6px 6px 0 var(--shadow); }

.course-name { font-family:'ZCOOL KuaiLe',cursive; font-size:20px; margin-bottom:6px; }
.course-info { font-size:14px; color:var(--ink-light); line-height:1.6; }
.course-teacher { font-size:15px; margin:6px 0; }
.course-diff { display:inline-block; padding:2px 10px; border-radius:20px; font-size:13px; color:#fff; margin-top:4px; }
.diff-easy { background:var(--safe); }
.diff-medium { background:var(--warn); }
.diff-hard { background:var(--danger); }

.nav-map {
  width:100%; max-width:600px; aspect-ratio:3/2;
  position:relative; border:3px solid var(--ink);
  border-radius:12px; background:#f0ebe3; margin:10px 0; overflow:hidden;
}

.map-room {
  position:absolute; border:2px solid var(--ink); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'ZCOOL KuaiLe',cursive; font-size:14px;
  cursor:pointer; transition:all .2s; background:#e8e3db;
}
.map-room:hover { background:#d4cfc7; transform:scale(1.05); }
.map-room.target { background:var(--accent4); animation:pulse 1s infinite; border-color:#e67e22; }
.map-room.wrong { background:var(--danger); color:#fff; animation:shake .4s; }
.map-room.correct { background:var(--safe); color:#fff; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(243,156,18,.4);} 50%{box-shadow:0 0 0 8px rgba(243,156,18,0);} }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
.map-corridor { position:absolute; background:#d5d0c8; }
.nav-hint { font-size:16px; color:var(--ink-light); text-align:center; margin:8px 0; }
.nav-hint strong { color:var(--accent4); font-family:'ZCOOL KuaiLe',cursive; }

.classroom-layout { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; max-width:500px; margin:10px 0; }
.teacher-desk {
  width:60%; padding:12px; background:#8B4513; color:#fff;
  text-align:center; border-radius:8px; font-family:'ZCOOL KuaiLe',cursive;
  font-size:16px; box-shadow:0 4px 8px rgba(0,0,0,.2);
}
.seat-row { display:flex; gap:6px; justify-content:center; }
.seat {
  width:44px; height:44px; border:2px solid var(--ink); border-radius:6px;
  display:flex; align-items:center; justify-content:center; font-size:18px;
  cursor:pointer; transition:all .15s; background:var(--paper);
}
.seat:hover { background:#fff3cd; transform:scale(1.1); }
.seat.occupied { background:#ddd; cursor:default; opacity:.6; }
.seat.selected { background:var(--accent4); border-color:#e67e22; transform:scale(1.15); }
.seat-label { font-size:13px; color:var(--ink-light); margin-top:2px; }
.seat-tip {
  font-size:14px; color:var(--ink-light); text-align:center; max-width:400px;
  line-height:1.6; padding:10px; background:#fff9e6;
  border:1px dashed var(--warn); border-radius:8px; margin:8px 0;
}

#classroom-screen { padding:0; user-select:none; }
.class-hud {
  width:100%; padding:10px 16px;
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(255,255,255,.9); backdrop-filter:blur(4px);
  border-bottom:2px solid #eee; z-index:20; flex-wrap:wrap; gap:6px;
}
.hud-item { display:flex; align-items:center; gap:6px; font-size:14px; }
.hud-label { color:var(--ink-light); }
.hud-bar { width:100px; height:14px; background:#eee; border-radius:7px; overflow:hidden; border:1px solid #ccc; }
.hud-fill { height:100%; border-radius:7px; transition:width .3s; }
.hud-fill.fish { background:linear-gradient(90deg,var(--accent2),#2ecc71); }
.hud-fill.danger { background:linear-gradient(90deg,var(--warn),var(--danger)); }
.hud-timer { font-family:'ZCOOL KuaiLe',cursive; font-size:22px; color:var(--accent); }

.classroom-scene { flex:1; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; padding:10px; }
.teacher-area { width:100%; max-width:500px; display:flex; flex-direction:column; align-items:center; margin-bottom:10px; }
.blackboard {
  width:90%; height:80px; background:#2d5016;
  border:6px solid #8B6914; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,.8); font-family:'Ma Shan Zheng',cursive;
  font-size:20px; text-shadow:1px 1px 2px rgba(0,0,0,.3);
  box-shadow:inset 0 0 30px rgba(0,0,0,.2); text-align:center; padding:0 10px;
}
.teacher-sprite { font-size:56px; margin:8px 0; transition:transform .3s; position:relative; }
.teacher-status {
  font-size:14px; padding:4px 14px; border-radius:20px;
  background:var(--safe); color:#fff; margin-bottom:6px;
  transition:all .3s; font-family:'ZCOOL KuaiLe',cursive;
}
.teacher-status.looking { background:var(--danger); animation:alertPulse .5s infinite; }
@keyframes alertPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }

.teacher-bubble {
  position:absolute; top:-40px; left:50%; transform:translateX(-50%);
  background:#fff; border:2px solid var(--ink); border-radius:12px;
  padding:6px 14px; font-size:14px; font-family:'ZCOOL KuaiLe',cursive;
  white-space:nowrap; opacity:0; transition:opacity .3s; z-index:10; pointer-events:none;
}
.teacher-bubble.show { opacity:1; }
.teacher-bubble::after {
  content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
  border-left:8px solid transparent; border-right:8px solid transparent; border-top:8px solid var(--ink);
}

.actions-panel { width:100%; max-width:520px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 10px; }
.action-btn {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:12px 6px; border:2px solid var(--ink); border-radius:10px;
  background:var(--paper); cursor:pointer; transition:all .15s;
  font-family:'ZCOOL KuaiLe',cursive; box-shadow:2px 2px 0 var(--shadow);
}
.action-btn:hover { transform:translateY(-2px); box-shadow:3px 3px 0 var(--shadow); }
.action-btn:active { transform:translateY(1px); box-shadow:none; }
.action-btn.active { border-color:var(--accent2); background:#e8f4fd; }
.action-btn.listen-btn.active { border-color:var(--safe); background:#e8fde8; }
.action-btn .emoji { font-size:28px; }
.action-btn .label { font-size:13px; }
.action-btn .pts { font-size:11px; color:var(--ink-light); }

.result-card {
  background:var(--paper); border:3px solid var(--ink);
  border-radius:16px; padding:30px; max-width:420px;
  text-align:center; box-shadow:6px 6px 0 var(--shadow);
}
.result-emoji { font-size:64px; margin-bottom:10px; }
.result-title { font-family:'ZCOOL KuaiLe',cursive; font-size:28px; margin-bottom:10px; }
.result-desc { font-size:15px; color:var(--ink-light); line-height:1.8; margin-bottom:20px; }
.result-stats { display:flex; gap:16px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
.stat-box { text-align:center; }
.stat-val { font-family:'ZCOOL KuaiLe',cursive; font-size:28px; color:var(--accent2); }
.stat-label { font-size:12px; color:var(--ink-light); }
.grade-badge { display:inline-block; padding:6px 24px; border-radius:30px; font-family:'ZCOOL KuaiLe',cursive; font-size:22px; color:#fff; margin-bottom:16px; }

.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.5);
  display:none; align-items:center; justify-content:center;
  z-index:100;
}
.overlay.active { display:flex; }

.event-popup {
  background:var(--paper); border:3px solid var(--ink);
  border-radius:16px; padding:24px; max-width:400px; width:90%;
  text-align:center; box-shadow:6px 6px 0 rgba(0,0,0,.2);
  animation:popIn .3s ease; max-height:90vh; overflow-y:auto;
}
@keyframes popIn { from{transform:scale(.8);opacity:0;} to{transform:scale(1);opacity:1;} }
.event-emoji { font-size:48px; margin-bottom:10px; }
.event-title { font-family:'ZCOOL KuaiLe',cursive; font-size:22px; margin-bottom:8px; }
.event-desc { font-size:14px; color:var(--ink-light); line-height:1.6; margin-bottom:16px; }

.quiz-options { display:flex; flex-direction:column; gap:8px; margin:12px 0; text-align:left; }
.quiz-opt {
  padding:10px 16px; border:2px solid #ddd; border-radius:10px;
  cursor:pointer; transition:all .15s; font-size:15px;
  background:var(--paper); display:flex; align-items:center; gap:8px;
}
.quiz-opt:hover { border-color:var(--accent2); background:#f0f7ff; transform:translateX(4px); }
.quiz-opt.correct { border-color:var(--safe); background:#e8fde8; pointer-events:none; }
.quiz-opt.wrong { border-color:var(--danger); background:#fde8e8; pointer-events:none; }
.quiz-opt .opt-key {
  width:26px; height:26px; border-radius:50%; background:var(--accent2);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:bold; flex-shrink:0;
}
.quiz-opt.correct .opt-key { background:var(--safe); }
.quiz-opt.wrong .opt-key { background:var(--danger); }

.quiz-timer-bar { width:100%; height:8px; background:#eee; border-radius:4px; overflow:hidden; margin:8px 0; }
.quiz-timer-fill { height:100%; background:linear-gradient(90deg,var(--safe),var(--warn),var(--danger)); border-radius:4px; transition:width .1s linear; }

.qte-zone {
  width:180px; height:180px; border-radius:50%;
  border:4px dashed var(--accent); display:flex;
  align-items:center; justify-content:center; flex-direction:column;
  cursor:pointer; margin:10px auto; transition:all .1s;
  font-family:'ZCOOL KuaiLe',cursive; gap:4px;
  background:rgba(231,76,60,.05); user-select:none;
}
.qte-zone:active { transform:scale(.93); background:rgba(39,174,96,.15); }
.qte-zone .qte-emoji { font-size:44px; }
.qte-zone .qte-label { font-size:13px; color:var(--ink-light); }
.qte-counter { font-family:'ZCOOL KuaiLe',cursive; font-size:24px; color:var(--accent); margin:4px 0; }

.type-target {
  font-size:20px; font-family:'Ma Shan Zheng',cursive;
  padding:12px 20px; background:#f0f7ff; border:2px solid var(--accent2);
  border-radius:10px; margin:8px 0; letter-spacing:2px;
}
.type-input {
  font-family:'ZCOOL KuaiLe',cursive; font-size:18px;
  padding:10px 16px; border:3px solid var(--ink);
  border-radius:8px; text-align:center; width:85%; max-width:300px;
  margin:8px auto; outline:none; display:block;
}
.type-input:focus { border-color:var(--accent2); }

.rollcall-input {
  font-family:'ZCOOL KuaiLe',cursive; font-size:24px;
  padding:10px 20px; border:3px solid var(--ink);
  border-radius:8px; text-align:center; width:200px;
  margin:10px auto; outline:none; display:block;
}
.rollcall-input:focus { border-color:var(--accent2); }

.opinion-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:10px 0; }
.opinion-btn {
  padding:8px 18px; border:2px solid var(--ink); border-radius:20px;
  font-family:'ZCOOL KuaiLe',cursive; font-size:14px;
  cursor:pointer; transition:all .15s; background:var(--paper);
}
.opinion-btn:hover { background:var(--accent2); color:#fff; border-color:var(--accent2); transform:scale(1.05); }

.note-card {
  background:#fffde6; border:1px solid #e6d9a0; border-radius:8px;
  padding:14px 18px; font-size:15px; margin:10px auto;
  transform:rotate(-1deg); box-shadow:2px 2px 6px rgba(0,0,0,.08);
  font-style:italic; max-width:280px;
}

.countdown-flash {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  z-index:200; background:rgba(0,0,0,.6);
  font-family:'ZCOOL KuaiLe',cursive; font-size:80px; color:#fff;
  text-shadow:0 0 30px rgba(255,255,255,.5);
  animation:cdPop .8s ease; pointer-events:none;
}
@keyframes cdPop { 0%{transform:scale(2);opacity:0;} 30%{transform:scale(1);opacity:1;} 80%{opacity:1;} 100%{opacity:0;} }

@media (max-width:600px) {
  .title-logo { font-size:36px; }
  .schedule-grid { grid-template-columns:1fr; }
  .actions-panel { grid-template-columns:repeat(3,1fr); gap:5px; }
  .action-btn { padding:8px 4px; }
  .action-btn .emoji { font-size:22px; }
  .action-btn .label { font-size:11px; }
  .hud-bar { width:70px; }
  .seat { width:36px; height:36px; font-size:14px; }
  .blackboard { height:60px; font-size:16px; }
  .teacher-sprite { font-size:42px; }
  .qte-zone { width:140px; height:140px; }
  .event-popup { padding:18px 14px; }
}
</style>
</head>
<body>
<div id="game-container">
  <div id="title-screen" class="screen active">
    <div class="title-doodle">📚 💤 📱 🎮 ✏️</div>
    <div class="title-logo">水课生存指南</div>
    <div class="title-sub">上课如上坟，摸鱼要谨慎<br>选对座位，避开老师，安全水到下课！</div>
    <button class="btn btn-primary" onclick="startGame()">开始摸鱼 🐟</button>
  </div>

  <div id="schedule-screen" class="screen">
    <div class="schedule-title">📋 今日课表</div>
    <p style="color:var(--ink-light);font-size:14px;margin-bottom:6px;">选一门课去水吧！不同老师有不同的脾气哦~</p>
    <div class="schedule-grid" id="schedule-grid"></div>
  </div>

  <div id="navigate-screen" class="screen">
    <div class="schedule-title">🏫 找到教室</div>
    <div class="nav-hint">快找到 <strong id="target-room-name">???</strong> 吧！点击正确的教室</div>
    <div class="nav-map" id="nav-map"></div>
    <div id="nav-msg" style="font-size:15px;min-height:24px;margin-top:6px;font-family:'ZCOOL KuaiLe',cursive;"></div>
  </div>

  <div id="seat-screen" class="screen">
    <div class="schedule-title">💺 选座位</div>
    <div class="seat-tip" id="seat-tip">💡 座位策略很重要！</div>
    <div class="classroom-layout" id="seat-layout"></div>
    <button class="btn btn-safe btn-small" id="seat-confirm-btn" style="margin-top:10px;display:none;" onclick="confirmSeat()">就坐这里！</button>
  </div>

  <div id="classroom-screen" class="screen">
    <div class="class-hud">
      <div class="hud-item">
        <span>🐟</span><span class="hud-label">摸鱼值</span>
        <div class="hud-bar"><div class="hud-fill fish" id="fish-bar" style="width:0%"></div></div>
        <span id="fish-val" style="font-size:13px;min-width:32px;">0%</span>
      </div>
      <div class="hud-item"><span class="hud-timer" id="class-timer">45:00</span></div>
      <div class="hud-item">
        <span>⚠️</span><span class="hud-label">怀疑值</span>
        <div class="hud-bar"><div class="hud-fill danger" id="danger-bar" style="width:0%"></div></div>
        <span id="danger-val" style="font-size:13px;min-width:32px;">0%</span>
      </div>
    </div>
    <div class="classroom-scene">
      <div class="teacher-area">
        <div class="blackboard" id="blackboard-text">欢迎来到水课</div>
        <div class="teacher-sprite" id="teacher-sprite">
          <div class="teacher-bubble" id="teacher-bubble"></div>🧑‍🏫
        </div>
        <div class="teacher-status" id="teacher-status">背对黑板写字中...</div>
      </div>
      <div style="font-size:13px;color:var(--ink-light);margin:4px 0;">— 你在 <span id="your-seat-label">后排角落</span> —</div>
      <div class="actions-panel" id="actions-panel"></div>
    </div>
  </div>

  <div id="result-screen" class="screen" style="justify-content:center;">
    <div class="result-card" id="result-card"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="event-popup" id="event-popup"></div>
  </div>
</div>

<script>
const G = {
  currentScreen:'title', selectedCourse:null, selectedSeat:null,
  seatPos:{row:0,col:0},
  fishPoints:0, fishTarget:100, suspicion:0, maxSuspicion:100,
  timeLeft:0, totalTime:0, currentAction:'listen',
  teacherState:'writing', teacherTimer:5,
  classInterval:null, teacherInterval:null,
  eventCooldown:0, caught:false, paused:false,
  seatRisk:1, seatName:'', comboStreak:0,
  rollCallCount:0, quizCount:0,
  usedQuizIds: new Set(), _opGood:[]
};

const COURSES = [
  {
    id:'marxism', name:'马克思主义基本原理', room:'A-301',
    teacher:'王教授', teacherEmoji:'👨‍🏫', type:'chill',
    desc:'佛系型 · 照着PPT念，基本不看下面',
    difficulty:'easy', diffLabel:'简单',
    scanRate:0.08, scanDuration:2, rollCallChance:0.02,
    blackboardTexts:['生产力决定生产关系','经济基础决定上层建筑','对立统一规律','量变引起质变','剩余价值理论'],
    speeches:['同学们翻到PPT第38页...','这个知识点考试要考的','我再讲五分钟就下课','大家记一下这个重点'],

let _clean=null;
function showOverlay(emoji,title,desc,btnText,cb){
  G.paused=true; if(_clean){_clean();_clean=null;}

/* ═══ 1. MULTIPLE CHOICE QUIZ ═══ */
function triggerQuiz(){
  G.paused=true; G.quizCount++;
  const c=G.selectedCourse;
  let pool=c.quizzes.map((q,i)=>({...q,idx:i})).filter(q=>!G.usedQuizIds.has(c.id+q.idx));
  if(!pool.length){G.usedQuizIds.clear();pool=c.quizzes.map((q,i)=>({...q,idx:i}));}
  const quiz=pool[Math.floor(Math.random()*pool.length)];
  G.usedQuizIds.add(c.id+quiz.idx);
  const keys='ABCD',tl=8; let done=false,tv=tl;

  $('event-popup').innerHTML=`
    <div class="event-emoji">📝</div>
    <div class="event-title">老师突然提问！</div>
    <div class="event-desc">"${quiz.q}"</div>
    <div class="quiz-timer-bar"><div class="quiz-timer-fill" id="qtf" style="width:100%"></div></div>
    <div id="qtt" style="font-family:'ZCOOL KuaiLe',cursive;font-size:18px;color:var(--accent);">${tl}s</div>
    <div class="quiz-options" id="qos">${quiz.opts.map((o,i)=>`<div class="quiz-opt" data-i="${i}"><span class="opt-key">${keys[i]}</span><span>${o}</span></div>`).join('')}</div>`;
  $('overlay').classList.add('active');

  document.querySelectorAll('#qos .quiz-opt').forEach(el=>{
    el.onclick=()=>{ if(done)return; done=true; clearInterval(iv); doQuizAnswer(parseInt(el.dataset.i),quiz.ans); };
  });

  const iv=setInterval(()=>{ if(done)return; tv-=0.1;
    const f=$('qtf'),t=$('qtt'); if(f)f.style.width=(tv/tl*100)+'%'; if(t)t.textContent=Math.ceil(tv)+'s';
    if(tv<=0){clearInterval(iv);if(!done){done=true;doQuizTimeout(quiz.ans);}}
  },100);
  _clean=()=>{clearInterval(iv);done=true;};

  const kh=e=>{ if(done)return; const m={a:0,b:1,c:2,d:3,'1':0,'2':1,'3':2,'4':3}; const i=m[e.key.toLowerCase()];
    if(i!==undefined){done=true;clearInterval(iv);document.removeEventListener('keydown',kh);doQuizAnswer(i,quiz.ans);}};
  document.addEventListener('keydown',kh);
  setTimeout(()=>document.removeEventListener('keydown',kh),(tl+1)*1000);
}

function doQuizAnswer(ch,co){
  document.querySelectorAll('#qos .quiz-opt').forEach(o=>{o.style.pointerEvents='none';const i=+o.dataset.i;if(i===co)o.classList.add('correct');if(i===ch&&i!==co)o.classList.add('wrong');});
  setTimeout(()=>{closeOverlay();if(ch===co){G.suspicion=Math.max(0,G.suspicion-12);showOverlay('✅','回答正确！','老师满意地点了点头\n怀疑值 -12','继续');}
  else{G.suspicion=Math.min(G.maxSuspicion,G.suspicion+20);showOverlay('❌','回答错误！','老师皱了皱眉..."上课认真听！"\n怀疑值 +20','继续');}},800);
}
function doQuizTimeout(co){
  document.querySelectorAll('#qos .quiz-opt').forEach(o=>{o.style.pointerEvents='none';if(+o.dataset.i===co)o.classList.add('correct');});
  setTimeout(()=>{closeOverlay();G.suspicion=Math.min(G.maxSuspicion,G.suspicion+25);showOverlay('⏰','超时了！','你愣在那里说不出话...\n怀疑值 +25','继续');},600);
}

/* ═══ EVENT DISPATCHER ═══ */
function triggerEvent(){
  const pool=[
    {fn:triggerQuiz,w:20},{fn:triggerRecite,w:10},{fn:triggerOpinion,w:12},
    {fn:triggerHidePhone,w:8},{fn:triggerMathRC,w:10},{fn:triggerSeatmate,w:15},
    {fn:triggerSpotCheck,w:12},{fn:triggerGroupDiscuss,w:6},{fn:triggerReadBoard,w:10},
    {fn:()=>{const a=ATMO[Math.floor(Math.random()*ATMO.length)];a.f();showOverlay(a.e,a.t,a.d,'继续');},w:22},
  ].map(p=>{
    let w=p.w;
    if((G.currentAction==='phone'||G.currentAction==='sleep')&&(p.fn===triggerHidePhone||p.fn===triggerSpotCheck))w*=2.5;
    if(G.suspicion>50&&p.fn===triggerSpotCheck)w*=1.5;
    if(G.quizCount>=5&&(p.fn===triggerQuiz||p.fn===triggerRecite||p.fn===triggerReadBoard||p.fn===triggerMathRC))w*=.3;
    return{...p,w};
  });
  const tot=pool.reduce((s,p)=>s+p.w,0);let r=Math.random()*tot;
  for(const p of pool){r-=p.w;if(r<=0){p.fn();return;}}
  pool[0].fn();
}

function startClass(){

function renderActs(){$('actions-panel').innerHTML=ACTIONS.map(a=>`
  <div class="action-btn ${a.id===G.currentAction?(a.id==='listen'?'listen-btn active':'active'):''}"

    <span class="pts">${a.pts>0?'🐟+'+a.pts:'安全'} ${a.risk>0?'⚠️'+a.risk:''}</span>
  </div>`).join('');}

function setAction(id){
  if(G.paused||G.caught)return;
  if(id!=='listen'&&(G.teacherState==='scanning'||G.teacherState==='staring'))G.suspicion=Math.min(G.maxSuspicion,G.suspicion+5);
  G.currentAction=id;
  document.querySelectorAll('.action-btn').forEach(b=>b.classList.remove('active','listen-btn'));
  const el=$('act-'+id);if(el){el.classList.add('active');if(id==='listen')el.classList.add('listen-btn');}
}

function gameLoop(){
  if(G.classInterval)clearInterval(G.classInterval);if(G.teacherInterval)clearInterval(G.teacherInterval);

  G.classInterval=setInterval(()=>{
    if(G.paused||G.caught)return;
    G.timeLeft--;G.eventCooldown--;
    const a=ACTIONS.find(x=>x.id===G.currentAction);
    if(a){if(a.pts>0){G.fishPoints=Math.min(G.fishTarget,G.fishPoints+a.pts*(2-G.seatRisk));G.comboStreak++;}
      else{G.suspicion=Math.max(0,G.suspicion-1.5);G.comboStreak=0;}
      if(a.risk>0){let rg=a.risk*G.seatRisk;if(G.teacherState==='scanning')rg*=2.5;if(G.teacherState==='staring')rg*=4;G.suspicion=Math.min(G.maxSuspicion,G.suspicion+rg);}}
    G.suspicion=Math.max(0,G.suspicion-.3);
    if(G.suspicion>=G.maxSuspicion){getCaught();return;}
    if(G.timeLeft<=0){classOver();return;}
    if(G.eventCooldown<=0&&Math.random()<.06){triggerEvent();G.eventCooldown=7+Math.floor(Math.random()*5);}
    updateHUD();
  },1000);

  G.teacherInterval=setInterval(()=>{if(G.paused||G.caught)return;updateTeacher();},800);
}

function updateTeacher(){
  const c=G.selectedCourse,r=Math.random();
  switch(G.teacherState){
    case'writing':case'lecturing':
      G.teacherTimer--;if(G.teacherTimer<=0){
        if(r<c.scanRate){G.teacherState='scanning';G.teacherTimer=c.scanDuration+Math.floor(Math.random()*3);}
        else if(r<c.scanRate+c.rollCallChance&&G.rollCallCount<4){G.teacherState='rollcall';G.teacherTimer=1;}
        else{G.teacherState=r<.5?'writing':'lecturing';G.teacherTimer=5+Math.floor(Math.random()*8);}
        if(c.type==='unpredictable'&&Math.random()<.15){G.teacherState='staring';G.teacherTimer=2+Math.floor(Math.random()*3);}}break;
    case'scanning':G.teacherTimer--;if(G.teacherTimer<=0){G.teacherState=Math.random()<.3?'lecturing':'writing';G.teacherTimer=4+Math.floor(Math.random()*6);}break;
    case'staring':G.teacherTimer--;if(G.teacherTimer<=0){G.teacherState='lecturing';G.teacherTimer=3+Math.floor(Math.random()*5);}break;
    case'rollcall':G.teacherState='lecturing';G.teacherTimer=6;
      [triggerMathRC,triggerQuiz,triggerOpinion,triggerReadBoard][Math.floor(Math.random()*4)]();return;
  }
  updateTeacherUI();
}

function updateTeacherUI(){
  const s=$('teacher-status'),sp=$('teacher-sprite'),b=$('teacher-bubble'),bb=$('blackboard-text'),c=G.selectedCourse;
  switch(G.teacherState){
    case'writing':s.textContent='✍️ 背对黑板写字中...';s.className='teacher-status';sp.style.transform='scaleX(-1)';
      bb.textContent=c.blackboardTexts[Math.floor(Math.random()*c.blackboardTexts.length)];b.classList.remove('show');break;
    case'lecturing':s.textContent='🗣️ 低头讲课中...';s.className='teacher-status';sp.style.transform='scaleX(1)';
      if(Math.random()<.2){b.textContent=c.speeches[Math.floor(Math.random()*c.speeches.length)];b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2500);}break;
    case'scanning':s.textContent='👀 正在扫视教室！';s.className='teacher-status looking';sp.style.transform='scaleX(1)';b.textContent='👀...';b.classList.add('show');break;
    case'staring':s.textContent='😠 盯着你这边看！';s.className='teacher-status looking';sp.style.transform='scaleX(1)';b.textContent='那边的同学...?';b.classList.add('show');break;
  }
}

function updateHUD(){
  const fp=Math.min(100,G.fishPoints/G.fishTarget*100),dp=Math.min(100,G.suspicion/G.maxSuspicion*100);
  $('fish-bar').style.width=fp+'%';$('fish-val').textContent=Math.floor(fp)+'%';
  $('danger-bar').style.width=dp+'%';$('danger-val').textContent=Math.floor(dp)+'%';
  if(dp>70)$('danger-bar').style.background='linear-gradient(90deg,#e74c3c,#c0392b)';
  else if(dp>40)$('danger-bar').style.background='linear-gradient(90deg,#f39c12,#e74c3c)';
  else $('danger-bar').style.background='linear-gradient(90deg,#f39c12,#e67e22)';
  const m=Math.floor(G.timeLeft/2),s=(G.timeLeft%2)*30;
  $('class-timer').textContent=`${String(m).padStart(2,'0')}:${s===0?'00':'30'}`;
  if(G.timeLeft<=10)$('class-timer').style.color=G.timeLeft%2===0?'var(--danger)':'var(--accent)';
}

function getCaught(){
  G.caught=true;clearInterval(G.classInterval);clearInterval(G.teacherInterval);
  const ms=['"出去站着！"','老师没收了你的手机','"平时分别想要了！"','被当众批评了...'];
  setTimeout(()=>{showScreen('result');const fp=Math.floor(G.fishPoints/G.fishTarget*100);
    $('result-card').innerHTML=`<div class="result-emoji">😭</div><div class="result-title">被抓了！</div>
      <div class="grade-badge" style="background:var(--danger);">水课失败</div>
      <div class="result-desc">${ms[Math.floor(Math.random()*ms.length)]}</div>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-val">${fp}%</div><div class="stat-label">摸鱼完成度</div></div>
        <div class="stat-box"><div class="stat-val">${Math.floor((1-G.timeLeft/G.totalTime)*100)}%</div><div class="stat-label">课程进度</div></div>
        <div class="stat-box"><div class="stat-val">${G.quizCount}</div><div class="stat-label">被提问</div></div>
      </div><button class="btn btn-primary" onclick="backToTitle()">再来一次</button>`;},300);
}

function classOver(){
  clearInterval(G.classInterval);clearInterval(G.teacherInterval);
  const fp=Math.floor(G.fishPoints/G.fishTarget*100);let g,gc,em,ti,de;
  if(fp>=90){g='S';gc='#e74c3c';em='🏆';ti='摸鱼之王！';de='极致摸鱼，堪称传说！';}
  else if(fp>=70){g='A';gc='#f39c12';em='🐟';ti='资深摸鱼人';de='技术纯熟！';}
  else if(fp>=50){g='B';gc='#3498db';em='😏';ti='合格水友';de='成功混过一节课！';}
  else if(fp>=25){g='C';gc='#27ae60';em='😐';ti='半听半摸';de='胆子可以再大点（不是）';}
  else{g='D';gc='#95a5a6';em='📖';ti='好学生警告';de='你几乎没摸鱼...这可是水课啊！';}

  setTimeout(()=>{showScreen('result');
    $('result-card').innerHTML=`<div class="result-emoji">${em}</div><div class="result-title">${ti}</div>
      <div class="grade-badge" style="background:${gc};">评级: ${g}</div>
      <div class="result-desc">${de}</div>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-val">${fp}%</div><div class="stat-label">摸鱼完成度</div></div>
        <div class="stat-box"><div class="stat-val">${Math.floor(G.suspicion)}%</div><div class="stat-label">最终怀疑值</div></div>
        <div class="stat-box"><div class="stat-val">${G.quizCount}</div><div class="stat-label">被提问</div></div>
        <div class="stat-box"><div class="stat-val">${G.rollCallCount}</div><div class="stat-label">被点名</div></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="backToTitle()">再来一次</button>
        <button class="btn" onclick="startGame()">换一门课</button>
      </div>`;},300);
}

function backToTitle(){showScreen('title');}

document.addEventListener('keydown',e=>{
  if(G.currentScreen!=='classroom'||G.paused||G.caught)return;
  const m={'1':'listen','2':'daze','3':'doodle','4':'novel','5':'phone','6':'sleep',
    q:'listen',w:'daze',e:'doodle',r:'novel',t:'phone',y:'sleep',' ':'listen'};
  const a=m[e.key];if(a){e.preventDefault();setAction(a);}
});
</script>
</body>
