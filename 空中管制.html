<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>空中管制 - 划线降落</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e14;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: #00ff88;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  #ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .hud-panel {
    background: rgba(0, 255, 136, 0.05);
    border: 1px solid rgba(0, 255, 136, 0.2);
    padding: 10px 18px;
    border-radius: 4px;
    backdrop-filter: blur(8px);
  }

  .hud-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0, 255, 136, 0.5);
    margin-bottom: 2px;
  }

  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
  }

  .hud-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .hud-lives {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }

  .life-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #ff4466;
    box-shadow: 0 0 8px rgba(255, 68, 102, 0.6);
    transition: all 0.3s;
  }

  .life-dot.lost {
    background: rgba(255, 68, 102, 0.15);
    box-shadow: none;
  }

  #start-screen, #gameover-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: rgba(10, 14, 20, 0.95);
    backdrop-filter: blur(10px);
    pointer-events: all;
    transition: opacity 0.5s;
  }

  .screen-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 40px rgba(0, 255, 136, 0.4);
    margin-bottom: 12px;
    letter-spacing: 4px;
  }

  .screen-sub {
    font-size: 14px;
    color: rgba(0, 255, 136, 0.5);
    margin-bottom: 40px;
    text-align: center;
    line-height: 1.8;
    max-width: 400px;
  }

  .btn-start {
    pointer-events: all;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 16px 48px;
    background: transparent;
    color: #00ff88;
    border: 2px solid #00ff88;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .btn-start:hover {
    background: rgba(0, 255, 136, 0.15);
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
    transform: scale(1.05);
  }

  .final-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 64px;
    font-weight: 900;
    color: #ffaa00;
    text-shadow: 0 0 40px rgba(255, 170, 0, 0.4);
    margin: 10px 0 30px;
  }

  .hidden { display: none !important; }

  .tutorial-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(0, 255, 136, 0.4);
    pointer-events: none;
    z-index: 10;
    animation: pulse-hint 2s ease-in-out infinite;
    white-space: nowrap;
  }

  @keyframes pulse-hint {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-overlay">
  <div class="hud-panel">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="score-display">0</div>
  </div>
  <div class="hud-right">
    <div class="hud-panel">
      <div class="hud-label">Lives</div>
      <div class="hud-lives" id="lives-display"></div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="level-display" style="font-size:20px;">1</div>
    </div>
  </div>
</div>

<div class="tutorial-hint" id="tutorial-hint">点击飞机 → 划线到跑道 → 引导降落</div>

<div id="start-screen">
  <div class="screen-title">空中管制</div>
  <div class="screen-sub">
    选中飞机，划出航线引导它们安全降落到跑道上<br>
    避免飞机相撞！飞机越多，挑战越大
  </div>
  <button class="btn-start" onclick="startGame()">开始管制</button>
</div>

<div id="gameover-screen" class="hidden">
  <div class="screen-title" style="color:#ff4466;text-shadow:0 0 40px rgba(255,68,102,0.4);">管制失败</div>
  <div class="hud-label" style="font-size:14px;margin-top:8px;">最终得分</div>
  <div class="final-score" id="final-score">0</div>
  <button class="btn-start" onclick="startGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Game State ──
let planes = [];
let runways = [];
let explosions = [];
let score = 0;
let lives = 3;
let level = 1;
let gameRunning = false;
let selectedPlane = null;
let drawingPath = [];
let spawnTimer = 0;
let landedCount = 0;
let hintShown = true;
let gridPhase = 0;

// ── Plane Types ──
const PLANE_TYPES = [
  { name: 'small',  speed: 2.0, size: 12, color: '#00ff88', score: 10, trail: '#00ff8844' },
  { name: 'medium', speed: 1.5, size: 16, color: '#00ccff', score: 20, trail: '#00ccff44' },
  { name: 'large',  speed: 1.0, size: 22, color: '#ffaa00', score: 30, trail: '#ffaa0044' },
];

// ── Runway ──
function createRunways() {
  runways = [];
  const rw1 = { x: W * 0.3, y: H * 0.7, angle: 0, len: 120, w: 18 };
  const rw2 = { x: W * 0.7, y: H * 0.55, angle: -Math.PI / 6, len: 120, w: 18 };
  runways.push(rw1, rw2);
  if (level >= 3) {
    runways.push({ x: W * 0.5, y: H * 0.35, angle: Math.PI / 4, len: 100, w: 16 });
  }
}

// ── Spawn ──
function spawnPlane() {
  const type = PLANE_TYPES[Math.floor(Math.random() * Math.min(1 + Math.floor(level / 2), 3))];
  const side = Math.floor(Math.random() * 4);
  let x, y, angle;
  const margin = 30;
  switch (side) {
    case 0: x = -margin; y = Math.random() * H * 0.6 + H * 0.1; angle = Math.random() * 0.6 - 0.3; break;
    case 1: x = W + margin; y = Math.random() * H * 0.6 + H * 0.1; angle = Math.PI + Math.random() * 0.6 - 0.3; break;
    case 2: x = Math.random() * W * 0.6 + W * 0.2; y = -margin; angle = Math.PI / 2 + Math.random() * 0.6 - 0.3; break;
    default: x = Math.random() * W * 0.6 + W * 0.2; y = H + margin; angle = -Math.PI / 2 + Math.random() * 0.6 - 0.3; break;
  }
  planes.push({
    x, y, angle,
    speed: type.speed * (0.9 + Math.random() * 0.2),
    size: type.size,
    color: type.color,
    score: type.score,
    trail: type.trail,
    name: type.name,
    path: [],
    pathIndex: 0,
    history: [],
    landed: false,
    landing: false,
    landingProgress: 0,
    targetRunway: null,
    fuel: 1.0,
    blink: 0,
    id: Math.random(),
  });
}

function getSpawnInterval() {
  return Math.max(1200, 3500 - level * 300);
}

// ── Drawing ──
function getPointerPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

function findPlaneAt(x, y) {
  let best = null, bestDist = 40;
  for (const p of planes) {
    if (p.landed || p.landing) continue;
    const d = Math.hypot(p.x - x, p.y - y);
    if (d < bestDist) { bestDist = d; best = p; }
  }
  return best;
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); onUp(e); }, { passive: false });

function onDown(e) {
  if (!gameRunning) return;
  const pos = getPointerPos(e);
  const p = findPlaneAt(pos.x, pos.y);
  if (p) {
    selectedPlane = p;
    drawingPath = [{ x: p.x, y: p.y }];
    if (hintShown) { hintShown = false; document.getElementById('tutorial-hint').style.display = 'none'; }
  }
}

function onMove(e) {
  if (!selectedPlane) return;
  const pos = getPointerPos(e);
  const last = drawingPath[drawingPath.length - 1];
  if (Math.hypot(pos.x - last.x, pos.y - last.y) > 8) {
    drawingPath.push({ x: pos.x, y: pos.y });
  }
}

function onUp(e) {
  if (selectedPlane && drawingPath.length > 2) {
    // Smooth the path
    const smoothed = smoothPath(drawingPath);
    selectedPlane.path = smoothed;
    selectedPlane.pathIndex = 0;
  }
  selectedPlane = null;
  drawingPath = [];
}

function smoothPath(pts) {
  if (pts.length < 3) return pts;
  const result = [pts[0]];
  for (let i = 1; i < pts.length - 1; i++) {
    result.push({
      x: pts[i - 1].x * 0.25 + pts[i].x * 0.5 + pts[i + 1].x * 0.25,
      y: pts[i - 1].y * 0.25 + pts[i].y * 0.5 + pts[i + 1].y * 0.25,
    });
  }
  result.push(pts[pts.length - 1]);
  return result;
}

// ── Update ──
function update(dt) {
  if (!gameRunning) return;

  gridPhase += dt * 0.02;

  // Spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    if (planes.filter(p => !p.landed).length < 4 + level * 2) {
      spawnPlane();
    }
    spawnTimer = getSpawnInterval();
  }

  // Update planes
  for (const p of planes) {
    if (p.landed) continue;

    // Landing animation
    if (p.landing) {
      p.landingProgress += dt * 0.002;
      if (p.landingProgress >= 1) {
        p.landed = true;
        score += p.score;
        landedCount++;
        if (landedCount % 8 === 0) {
          level++;
          document.getElementById('level-display').textContent = level;
        }
        document.getElementById('score-display').textContent = score;
        addExplosion(p.x, p.y, p.color, 'land');
      }
      // Slide along runway
      const rw = p.targetRunway;
      const cx = Math.cos(rw.angle), cy = Math.sin(rw.angle);
      const startX = rw.x - cx * rw.len * 0.45;
      const startY = rw.y - cy * rw.len * 0.45;
      p.x = startX + cx * rw.len * 0.9 * p.landingProgress;
      p.y = startY + cy * rw.len * 0.9 * p.landingProgress;
      p.size = p.size * (1 - p.landingProgress * 0.3);
      continue;
    }

    // Follow path
    if (p.path.length > 0 && p.pathIndex < p.path.length) {
      const target = p.path[p.pathIndex];
      const dx = target.x - p.x;
      const dy = target.y - p.y;
      const dist = Math.hypot(dx, dy);
      const targetAngle = Math.atan2(dy, dx);
      // Smooth turn
      let angleDiff = targetAngle - p.angle;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      p.angle += angleDiff * Math.min(1, dt * 0.008);
      if (dist < p.speed * 3) p.pathIndex++;
    }

    // Move
    p.x += Math.cos(p.angle) * p.speed * dt * 0.06;
    p.y += Math.sin(p.angle) * p.speed * dt * 0.06;

    // Trail
    p.history.push({ x: p.x, y: p.y });
    if (p.history.length > 60) p.history.shift();

    // Blink
    p.blink += dt * 0.005;

    // Check runway landing
    for (const rw of runways) {
      const dx = p.x - rw.x;
      const dy = p.y - rw.y;
      const dist = Math.hypot(dx, dy);
      // Approach angle check
      let approachAngle = Math.abs(p.angle - rw.angle);
      while (approachAngle > Math.PI) approachAngle = Math.abs(approachAngle - Math.PI * 2);
      // Also check reverse direction
      let approachAngle2 = Math.abs(p.angle - (rw.angle + Math.PI));
      while (approachAngle2 > Math.PI) approachAngle2 = Math.abs(approachAngle2 - Math.PI * 2);
      const minApproach = Math.min(approachAngle, approachAngle2);

      if (dist < rw.len * 0.5 && minApproach < 0.5 && p.path.length > 0) {
        p.landing = true;
        p.landingProgress = 0;
        p.targetRunway = rw;
        p.angle = approachAngle2 < approachAngle ? rw.angle + Math.PI : rw.angle;
        break;
      }
    }

    // Out of bounds - remove with penalty
    const margin = 100;
    if (p.x < -margin || p.x > W + margin || p.y < -margin || p.y > H + margin) {
      if (p.path.length === 0) continue; // arriving planes
      p.landed = true; // just remove
    }
  }

  // Collision detection
  for (let i = 0; i < planes.length; i++) {
    for (let j = i + 1; j < planes.length; j++) {
      const a = planes[i], b = planes[j];
      if (a.landed || b.landed || a.landing || b.landing) continue;
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      if (dist < (a.size + b.size) * 0.7) {
        // Collision!
        addExplosion((a.x + b.x) / 2, (a.y + b.y) / 2, '#ff4466', 'crash');
        a.landed = true;
        b.landed = true;
        lives--;
        updateLivesDisplay();
        if (lives <= 0) {
          gameOver();
          return;
        }
      }
    }
  }

  // Remove landed planes
  planes = planes.filter(p => !p.landed);

  // Update explosions
  for (const ex of explosions) {
    ex.life -= dt * 0.002;
    ex.particles.forEach(pt => {
      pt.x += pt.vx * dt * 0.06;
      pt.y += pt.vy * dt * 0.06;
      pt.vy += 0.02;
    });
  }
  explosions = explosions.filter(e => e.life > 0);
}

function addExplosion(x, y, color, type) {
  const particles = [];
  const count = type === 'crash' ? 30 : 15;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * (type === 'crash' ? 4 : 2) + 1;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
    });
  }
  explosions.push({ x, y, color, type, life: 1, particles });
}

// ── Draw ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background grid
  drawGrid();

  // Radar sweep
  drawRadarSweep();

  // Runways
  for (const rw of runways) drawRunway(rw);

  // Drawing path (in-progress)
  if (selectedPlane && drawingPath.length > 1) {
    ctx.strokeStyle = selectedPlane.color;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.moveTo(drawingPath[0].x, drawingPath[0].y);
    for (let i = 1; i < drawingPath.length; i++) {
      ctx.lineTo(drawingPath[i].x, drawingPath[i].y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }

  // Planes
  for (const p of planes) {
    if (p.landed) continue;
    drawPlane(p);
  }

  // Explosions
  for (const ex of explosions) {
    const a = ex.life;
    for (const pt of ex.particles) {
      ctx.globalAlpha = a * 0.8;
      ctx.fillStyle = ex.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 2 + (1 - a) * 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Flash
    if (ex.type === 'crash' && ex.life > 0.7) {
      ctx.globalAlpha = (ex.life - 0.7) * 3;
      const grad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, 60);
      grad.addColorStop(0, ex.color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(ex.x, ex.y, 60, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(0, 255, 136, 0.04)';
  ctx.lineWidth = 1;
  const gap = 60;
  for (let x = 0; x < W; x += gap) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += gap) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Radar circles
  const cx = W / 2, cy = H / 2;
  for (let r = 100; r < Math.max(W, H); r += 150) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0, 255, 136, 0.03)';
    ctx.stroke();
  }
}

function drawRadarSweep() {
  const cx = W / 2, cy = H / 2;
  const angle = gridPhase * 0.5;
  const maxR = Math.hypot(W, H) / 2;
  const grad = ctx.createConicalGradient?.(angle, cx, cy);
  // Fallback: just draw a faint line
  ctx.strokeStyle = 'rgba(0, 255, 136, 0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(angle) * maxR, cy + Math.sin(angle) * maxR);
  ctx.stroke();
}

function drawRunway(rw) {
  ctx.save();
  ctx.translate(rw.x, rw.y);
  ctx.rotate(rw.angle);

  // Glow
  const glowGrad = ctx.createLinearGradient(-rw.len / 2, 0, rw.len / 2, 0);
  glowGrad.addColorStop(0, 'rgba(255, 170, 0, 0.0)');
  glowGrad.addColorStop(0.3, 'rgba(255, 170, 0, 0.1)');
  glowGrad.addColorStop(0.7, 'rgba(255, 170, 0, 0.1)');
  glowGrad.addColorStop(1, 'rgba(255, 170, 0, 0.0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(-rw.len / 2, -rw.w, rw.len, rw.w * 2);

  // Runway body
  ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
  ctx.fillRect(-rw.len / 2, -rw.w / 2, rw.len, rw.w);

  // Border
  ctx.strokeStyle = 'rgba(255, 170, 0, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-rw.len / 2, -rw.w / 2, rw.len, rw.w);

  // Center dashes
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(-rw.len / 2, 0);
  ctx.lineTo(rw.len / 2, 0);
  ctx.stroke();
  ctx.setLineDash([]);

  // Threshold marks
  ctx.fillStyle = 'rgba(255, 170, 0, 0.7)';
  for (let i = -3; i <= 3; i++) {
    if (i === 0) continue;
    ctx.fillRect(-rw.len / 2 + 5, i * 3 - 0.5, 12, 1);
    ctx.fillRect(rw.len / 2 - 17, i * 3 - 0.5, 12, 1);
  }

  // Label
  ctx.fillStyle = 'rgba(255, 170, 0, 0.5)';
  ctx.font = '9px "Share Tech Mono"';
  ctx.textAlign = 'center';
  ctx.fillText('RWY', 0, rw.w / 2 + 14);

  ctx.restore();
}

function drawPlane(p) {
  const isSelected = p === selectedPlane;

  // Trail
  if (p.history.length > 1) {
    ctx.beginPath();
    ctx.moveTo(p.history[0].x, p.history[0].y);
    for (let i = 1; i < p.history.length; i++) {
      ctx.lineTo(p.history[i].x, p.history[i].y);
    }
    ctx.strokeStyle = p.trail;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Path preview
  if (p.path.length > 0 && p.pathIndex < p.path.length && !p.landing) {
    ctx.beginPath();
    const startIdx = Math.max(0, p.pathIndex - 1);
    ctx.moveTo(p.path[startIdx].x, p.path[startIdx].y);
    for (let i = startIdx + 1; i < p.path.length; i++) {
      ctx.lineTo(p.path[i].x, p.path[i].y);
    }
    ctx.strokeStyle = p.color + '55';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Selection ring
  if (isSelected) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size + 10, 0, Math.PI * 2);
    ctx.strokeStyle = p.color + '66';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Danger ring (no path)
  if (p.path.length === 0 && !p.landing) {
    const pulseAlpha = Math.sin(p.blink * 3) * 0.3 + 0.3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size + 14, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 68, 102, ${pulseAlpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle + Math.PI / 2);

  // Glow
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size * 2);
  glow.addColorStop(0, p.color + '22');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, p.size * 2, 0, Math.PI * 2);
  ctx.fill();

  // Plane shape
  const s = p.size;
  ctx.fillStyle = p.color;
  ctx.strokeStyle = p.color;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';

  // Fuselage
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.lineTo(s * 0.25, -s * 0.2);
  ctx.lineTo(s * 0.2, s * 0.6);
  ctx.lineTo(0, s * 0.8);
  ctx.lineTo(-s * 0.2, s * 0.6);
  ctx.lineTo(-s * 0.25, -s * 0.2);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.beginPath();
  ctx.moveTo(-s * 0.25, -s * 0.05);
  ctx.lineTo(-s * 0.9, s * 0.2);
  ctx.lineTo(-s * 0.8, s * 0.35);
  ctx.lineTo(-s * 0.2, s * 0.2);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(s * 0.25, -s * 0.05);
  ctx.lineTo(s * 0.9, s * 0.2);
  ctx.lineTo(s * 0.8, s * 0.35);
  ctx.lineTo(s * 0.2, s * 0.2);
  ctx.closePath();
  ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(-s * 0.35, s * 0.65);
  ctx.lineTo(-s * 0.15, s * 0.55);
  ctx.lineTo(s * 0.15, s * 0.55);
  ctx.lineTo(s * 0.35, s * 0.65);
  ctx.closePath();
  ctx.fill();

  // Blinking light
  const blinkOn = Math.sin(p.blink * 5) > 0.3;
  if (blinkOn) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -s * 0.7, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // Altitude label (for no-path planes)
  if (!p.landing) {
    ctx.fillStyle = p.color + '88';
    ctx.font = '9px "Share Tech Mono"';
    ctx.textAlign = 'left';
    const label = p.name === 'large' ? 'HVY' : p.name === 'medium' ? 'MED' : 'LGT';
    ctx.fillText(label, p.x + p.size + 6, p.y + 4);
  }
}

// ── HUD ──
function updateLivesDisplay() {
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'life-dot' + (i >= lives ? ' lost' : '');
    el.appendChild(dot);
  }
}

// ── Game Control ──
function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  planes = [];
  explosions = [];
  score = 0;
  lives = 3;
  level = 1;
  landedCount = 0;
  spawnTimer = 500;
  gameRunning = true;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('level-display').textContent = '1';
  updateLivesDisplay();
  createRunways();
  hintShown = true;
  document.getElementById('tutorial-hint').style.display = '';
}

function gameOver() {
  gameRunning = false;
  document.getElementById('final-score').textContent = score;
  document.getElementById('gameover-screen').classList.remove('hidden');
}

// ── Loop ──
let lastTime = 0;
function loop(time) {
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
updateLivesDisplay();
</script>
